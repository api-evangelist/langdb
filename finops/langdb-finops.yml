description: >-
  FinOps view of LangDB AI Gateway spend. LangDB centralizes spend across many
  model providers behind one gateway and adds native cost-management surfaces:
  per-thread cost, total and per-model usage endpoints, time-series analytics,
  project budgets, and per-user / per-group spend limits. Model usage is billed
  at underlying provider rates; the managed service adds subscription and/or
  enterprise fees. Exact gateway fees and any markup are not fully published
  and are not reconciled in this artifact.
notes: >-
  Use the /usage/total, /usage/models, /analytics, and /threads/{id}/cost
  endpoints for cost visibility. Confirm subscription fees, any per-request
  gateway charge, and budget/cost-group configuration during reconciliation.
