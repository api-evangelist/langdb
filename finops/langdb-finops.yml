publisherName: LangDB
serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: LangDB AI Gateway
  ServiceCategory: AI and Machine Learning
  ProviderName: LangDB
  PublisherName: LangDB
  InvoiceIssuerName: LangDB
