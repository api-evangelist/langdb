meters:
- name: input_tokens
  description: Prompt tokens sent through the gateway, billed at the routed model's input rate.
  unit: tokens
  aggregation: sum
  dimensions:
  - project
  - model
  - provider
- name: output_tokens
  description: Tokens generated by the routed model, billed at its output rate.
  unit: tokens
  aggregation: sum
  dimensions:
  - project
  - model
  - provider
- name: embedding_tokens
  description: Tokens embedded via the /embeddings endpoint.
  unit: tokens
  aggregation: sum
  dimensions:
  - project
  - model
- name: images_generated
  description: Images produced via the /images/generations endpoint.
  unit: images
  aggregation: sum
  dimensions:
  - project
  - model
- name: thread_cost
  description: Aggregated cost per conversation thread, available via /threads/{thread_id}/cost.
  unit: usd
  aggregation: sum
  dimensions:
  - project
  - thread
- name: subscription_fee
  description: Managed-service subscription fee for paid / enterprise tiers.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Pull /usage/total, /usage/models, and /analytics to inspect token burn and cost per project and model.
- name: Allocation
  description: Tag requests with X-Project-Id, X-Thread-Id, X-Run-Id, and X-Label to map spend to teams, sessions, and workflows.
- name: Optimization
  description: Use routing to send work to cheaper models, enable fallbacks/load balancing, and set budgets to cap spend.
- name: Accountability
  description: Set per-user and per-group spend limits and project budgets; review per-model usage monthly against budget.
maintainers:
